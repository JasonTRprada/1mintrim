<!doctype html>
<html lang="ko">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Jason's Workstation</title>
  <style>
    *{box-sizing:border-box}html,body{min-height:100%;margin:0;background:#111;color:#f2ede4;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}body{display:grid;place-items:center;overflow-x:hidden}.home{position:relative;width:min(100vw,1920px);aspect-ratio:16/9;background:#111 url('assets/home-archive-layout-v2.png') center/contain no-repeat}.portal{position:absolute;top:8.6%;bottom:0;display:block;outline:0;transition:background .3s ease,box-shadow .3s ease}.portal:focus-visible,.portal:hover{background:rgba(213,231,51,.055);box-shadow:inset 0 0 0 1px rgba(213,231,51,.85)}.tarot{left:24.45%;width:19.65%}.gallery{left:44.45%;width:18.35%}.music{left:62.9%;width:17.3%}.tools{left:80.55%;width:19.45%}@media(max-width:760px){body{display:block}.home{width:100%;min-width:760px;transform-origin:top left;transform:scale(calc(100vw / 760));margin-bottom:calc(-760px * .5625 + 56.25vw)}}
  </style>
</head>
<body>
  <main class="home" aria-label="Jason's Workstation archive">
    <a class="portal tarot" href="tarot/" aria-label="타로 — Paws Arcana"></a>

    <a class="portal music" href="#music" aria-label="뮤직"></a>
