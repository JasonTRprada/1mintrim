    :root{--paper:#e6e0d4;--acid:#d9e638;--ink:#090a0a;--muted:#b9b5ad}*{box-sizing:border-box}html,body{min-height:100%;margin:0;background:var(--ink);color:var(--paper)}body{font-family:'DM Mono',monospace;overflow-x:hidden}.page{position:relative;min-height:100svh;padding:31px 3vw 28px;background:var(--ink)}.topbar,.footer,.intro,.portals{position:relative;z-index:1}.topbar{display:flex;justify-content:space-between;align-items:center;gap:24px;font-size:12px;letter-spacing:.1em}.brand{color:inherit;text-decoration:none;font-weight:500}.nav{display:flex;align-items:center;gap:34px}.language{display:flex;gap:8px}.language button{appearance:none;border:0;background:transparent;color:var(--paper);font:inherit;cursor:pointer;opacity:.52;padding:4px}.language button.active{opacity:1;color:var(--acid)}.menu{width:29px;height:14px;border-top:2px solid var(--paper);border-bottom:2px solid var(--paper);opacity:.9}.intro{position:absolute;right:8.6vw;top:20.5%;width:160px;font-size:10px;line-height:1.62;letter-spacing:.09em;color:var(--paper)}.intro:before,.intro:after{content:"";display:block;width:42px;height:1px;background:var(--acid);margin:0 0 14px}.intro:after{margin:14px 0 0}.portals{width:min(1360px,92vw);margin:23vh auto 0;display:grid;grid-template-columns:1.15fr 1.1fr 1.1fr .92fr;align-items:end;gap:12px}.portal{position:relative;display:block;min-height:490px;color:var(--paper);text-decoration:none;isolation:isolate;overflow:hidden;transform-origin:bottom center;transition:transform .5s cubic-bezier(.2,.8,.2,1),filter .4s;outline:none}.portal:before{content:"";position:absolute;inset:0;border:1px solid rgba(230,224,212,.18);background-image:var(--wash),url('assets/workstation-archive-v1.png');background-size:100% 100%,456% 164%;background-repeat:no-repeat;background-position:center,var(--x) var(--y);z-index:-2;filter:saturate(.94) contrast(1.08);transition:transform 1.1s cubic-bezier(.2,.8,.2,1),filter .5s,background-position 1.1s}.portal:after{content:"";position:absolute;inset:0;z-index:-1;background:linear-gradient(0deg,rgba(0,0,0,.47),transparent 40%),rgba(0,0,0,.06);transition:background .4s}.portal:hover,.portal:focus-visible{z-index:3;transform:translateY(-17px) scale(1.025);filter:brightness(1.14)}.portals:has(.portal:hover) .portal:not(:hover){filter:brightness(.6) saturate(.65);transform:translateY(8px)}.portal:hover:before,.portal:focus-visible:before{transform:scale(1.075);filter:saturate(1.18) contrast(1.12)}.portal:hover:after,.portal:focus-visible:after{background:linear-gradient(0deg,rgba(0,0,0,.18),transparent 55%)}.number{position:absolute;top:19px;left:18px;font:400 38px/1 'Noto Serif KR',serif;text-decoration:underline;text-underline-offset:8px}.portal-label{position:absolute;bottom:14px;left:16px;right:16px;display:flex;align-items:center;gap:12px;font:400 29px/1 'Noto Serif KR',serif}.portal-label:after{content:'→';margin-left:auto;color:var(--acid);font-family:'DM Mono',monospace;font-size:26px;transform:translateX(-5px);transition:transform .35s}.portal:hover .portal-label:after{transform:translateX(3px)}.portal-label i{height:1px;flex:1;background:rgba(230,224,212,.72);transform-origin:left;transition:transform .35s}.portal:hover .portal-label i{transform:scaleX(.82);background:var(--acid)}.tarot{--wash:linear-gradient(#a5271d66,#37120f33);--x:14%;--y:31%;min-height:570px;transform:translateY(-7px)}.gallery{--wash:linear-gradient(#10101022,#10101066);--x:42%;--y:46%}.music{--wash:linear-gradient(#0c2d8688,#05091822);--x:70%;--y:43%;min-height:520px;transform:translateY(44px)}.tools{--wash:linear-gradient(#1a1a1a55,#090a0a22);--x:92%;--y:48%;min-height:470px;transform:translateY(20px)}.music:before{animation:music-pulse 7s ease-in-out infinite}.tools:before{animation:tool-scan 8s ease-in-out infinite}.tarot:before{animation:tarot-drift 8s ease-in-out infinite}@keyframes tarot-drift{50%{background-position:center,14% 27%}}@keyframes music-pulse{50%{filter:saturate(1.45) contrast(1.16);background-position:center,68% 41%}}@keyframes tool-scan{50%{background-position:center,92% 43%;filter:brightness(1.18) contrast(1.2)}}.footer{position:absolute;bottom:24px;left:3vw;right:3vw;display:flex;justify-content:space-between;font-size:9px;letter-spacing:.12em;color:var(--muted)}.footer b{color:var(--acid);font-weight:500}@media (max-width:900px){.page{padding:21px 20px 70px}.intro{display:none}.topbar{font-size:10px}.nav>a{display:none}.nav{gap:14px}.portals{margin:105px auto 105px;width:min(590px,100%);grid-template-columns:1fr 1fr;gap:30px 10px}.portal,.tarot,.music,.tools{min-height:340px;transform:none}.portal-label{bottom:-39px;font-size:20px}.number{font-size:27px}.footer{left:20px;right:20px;bottom:20px;font-size:8px}.portals:has(.portal:hover) .portal:not(:hover){transform:none}.portal:hover,.portal:focus-visible{transform:translateY(-8px) scale(1.01)}}@media (max-width:540px){.portals{grid-template-columns:1fr;margin-top:80px;gap:24px}.portal,.tarot,.music,.tools{min-height:370px}.footer span:last-child{display:none}.topbar{align-items:flex-start}.brand{max-width:150px;line-height:1.3}}

  </main>
  <script>
    const buttons=document.querySelectorAll('[data-lang]'); const trans=document.querySelectorAll('[data-ko]');
    function setLanguage(lang){document.documentElement.lang=lang;buttons.forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));trans.forEach(el=>el.textContent=el.dataset[lang]);document.title=lang==='ko'?"Jason's Workstation | 제이슨의 작업실":"Jason's Workstation"}
    buttons.forEach(b=>b.addEventListener('click',()=>setLanguage(b.dataset.lang)));setLanguage('ko');
  </script>
</body></html>
